function loadLeads(){try{const s=localStorage.getItem('wl_v4');if(s)return JSON.parse(s);}catch(e){}return null;}
function saveLeads(l){localStorage.setItem('wl_v4',JSON.stringify(l));}
function getLeads(){const s=loadLeads();if(s&&s.length>0)return s;saveLeads(INITIAL_DATA);return INITIAL_DATA;}

const today=new Date();today.setHours(0,0,0,0);
const todayStr=today.toISOString().slice(0,10);
function pDate(s){if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return isNaN(d)?null:d;}
function diff(d){if(!d)return null;return Math.round((d-today)/86400000);}
function fmt(s){if(!s)return'—';const d=pDate(s);if(!d)return'—';return d.toLocaleDateString('nl-NL',{day:'2-digit',month:'short',year:'numeric'});}
function nid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sBadge(s){return{'In contact':'s-contact','Nieuw':'s-new','Beeindigt':'s-end','Verkocht':'s-sold'}[s]||'s-new';}
function pBadge(p){if(!p||p==='Normaal')return'p-norm';if(p==='Hoog')return'p-hoog';return'p-laag';}

// Search without losing focus — render() rebuilds the DOM so we restore cursor position
function onSearch(val){
  S.q=val; S.lp=1;
  // Re-render but put focus + cursor back on the search input
  render();
  const inp=document.getElementById('search-input');
  if(inp){inp.focus();inp.setSelectionRange(val.length,val.length);}
}

function filtered(){
  let l=S.leads;
  if(S.page==='nieuw') l=l.filter(x=>!x.archived&&x.status==='Nieuw');
  else if(S.page==='contact') l=l.filter(x=>!x.archived&&x.status==='In contact');
  else if(S.page==='verkocht') l=l.filter(x=>x.status==='Verkocht');
  else if(S.page==='archief') l=l.filter(x=>x.archived&&x.status==='Beeindigt');
  else if(S.page==='followup') l=l.filter(x=>!x.archived);
  else l=l.filter(x=>!x.archived);
  const q=S.q.toLowerCase();
  if(q)l=l.filter(x=>(x.naam||'').toLowerCase().includes(q)||(x.bedrijf||'').toLowerCase().includes(q)||(x.land||'').toLowerCase().includes(q)||(x.beschrijving||'').toLowerCase().includes(q));
  if(S.fPrio)l=l.filter(x=>x.prioriteit===S.fPrio);
  if(S.fFU==='overdue')l=l.filter(x=>{const d=pDate(x.follow_up_datum);return d&&diff(d)<0;});
  else if(S.fFU==='today')l=l.filter(x=>{const d=pDate(x.follow_up_datum);return d&&diff(d)===0;});
  else if(S.fFU==='week')l=l.filter(x=>{const d=pDate(x.follow_up_datum);const df=diff(d);return df!=null&&df>=0&&df<=7;});
  else if(S.fFU==='nodate')l=l.filter(x=>!x.follow_up_datum);
  const col=S.sort.col;
  return[...l].sort((a,b)=>{
    let va=a[col]||'',vb=b[col]||'';
    if(['datum_binnengekomen','follow_up_datum','laatste_contact'].includes(col)){va=va?new Date(va).getTime():0;vb=vb?new Date(vb).getTime():0;}
    else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}
    if(va<vb)return S.sort.asc?-1:1;if(va>vb)return S.sort.asc?1:-1;return 0;
  });
}

function counts(){
  const l=S.leads;
  const active=l.filter(x=>!x.archived);
  const overdue=active.filter(x=>{const d=pDate(x.follow_up_datum);return d&&diff(d)<0;});
  const tod=active.filter(x=>{const d=pDate(x.follow_up_datum);return d&&diff(d)===0;});
  const week=active.filter(x=>{const d=pDate(x.follow_up_datum);const df=diff(d);return df!=null&&df>0&&df<=7;});
  const month=active.filter(x=>{const d=pDate(x.follow_up_datum);const df=diff(d);return df!=null&&df>7&&df<=31;});
  return{
    nieuw:l.filter(x=>!x.archived&&x.status==='Nieuw').length,
    contact:l.filter(x=>!x.archived&&x.status==='In contact').length,
    verkocht:l.filter(x=>x.status==='Verkocht').length,
    archief:l.filter(x=>x.archived&&x.status==='Beeindigt').length,
    overdue,tod,week,month,
    urg:overdue.length+tod.length
  };
}
function uniq(col){return[...new Set(S.leads.map(l=>l[col]).filter(Boolean))].sort();}

        <button onclick="set({gmailModal:false})" style="padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;">✕</button>
      </div>
    </div>`;
  }
  if (!GMAIL_API_URL) {
    return `<div class="gmail-status" onclick="promptGmailUrl()" title="Klik om Gmail te koppelen">
      <span class="gmail-dot disconnected"></span>
      <span class="gmail-label">Gmail koppelen</span>
      <span style="font-size:10px;color:var(--text3)">→</span>
    </div>`;
  }
  if (S.gmailLoading) {
    return `<div class="gmail-status">
      <span class="gmail-dot loading"></span>
      <span class="gmail-label">Gmail laden…</span>
    </div>`;
  }
  const unread = S.gmailUnread;
  const badge = unread > 0 ? `<span class="gmail-badge">${unread}</span>` : '';
  const label = unread === null ? 'Gmail' : unread === 0 ? 'Geen nieuwe leads' : `${unread} nieuwe lead${unread !== 1 ? 's' : ''}`;
  return `<div class="gmail-status" onclick="fetchGmailLeads(true)" title="Klik om te vernieuwen">

    <span class="gmail-label">${label}</span>
    ${badge}
  </div>
  ${unread > 0 ? `<button class="gmail-import-btn" onclick="importGmailLeads()">⬇ Importeer ${unread} lead${unread !== 1 ? 's' : ''}</button>` : ''}
  <div style="margin-top:6px;text-align:right;"><span onclick="disconnectGmail()" style="font-size:10px;color:var(--text3);cursor:pointer;text-decoration:underline;">ontkoppelen</span></div>`;
}

function promptGmailUrl() {
  // Show inline input in sidebar instead of prompt()
  set({gmailModal: true});
}

function saveGmailUrl() {
  const input = document.getElementById('gmail-url-input');
  if (!input) return;
  const url = input.value.trim();
  if (url && url.startsWith('https://')) {
    GMAIL_API_URL = url;
    localStorage.setItem('wl_gmail_url', GMAIL_API_URL);
    set({gmailModal: false, gmailUnread: null});
    fetchGmailLeads(true);
  } else {
    input.style.borderColor = 'var(--red)';
    input.placeholder = 'URL moet beginnen met https://';
  }
}

function disconnectGmail() {
  GMAIL_API_URL = '';
  localStorage.removeItem('wl_gmail_url');
  set({gmailUnread: null, gmailModal: false});
}

async function callScript(action) {
  // Apps Script redirects to a new URL — we must follow redirects manually
  const url = GMAIL_API_URL + '?action=' + action;
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function fetchGmailLeads(showFeedback) {
  if (!GMAIL_API_URL) return;
  set({gmailLoading: true});
  try {
    const data = await callScript('count');
    if (data.error) throw new Error(data.error);
    set({gmailUnread: data.unread, gmailLoading: false});
  } catch(e) {
    set({gmailLoading: false});
    if (showFeedback) alert('Kon Gmail niet bereiken. Controleer de Apps Script URL.\n\n' + e.message);
  }
}

async function importGmailLeads() {
  if (!GMAIL_API_URL) return;
  set({gmailLoading: true});
  try {
    const data = await callScript('fetch');
    if (data.error) throw new Error(data.error);
    const incoming = data.leads || [];
    if (incoming.length === 0) { set({gmailUnread: 0, gmailLoading: false}); return; }

    // Convert Gmail leads to app lead format
    const newLeads = incoming.map(l => ({
      id: nid(),
      naam: l.name || '',
      bedrijf: l.company || '',
      email: l.from_email || '',
      telefoon: '',
      land: '',
      status: 'Nieuw',
      prioriteit: 'Normaal',
      type_interesse: '',
      beschrijving: l.message || '',
      datum_binnengekomen: l.date ? l.date.split('T')[0] : new Date().toISOString().split('T')[0],
      laatste_contact: '',
      follow_up_datum: '',
      follow_up_auto: null,
      contact_persoon_intern: '',
      bron: 'Gmail',
      volgende_actie: '',
      opmerkingen: '',
      archived: false
    }));

    const leads = [...newLeads, ...S.leads];
    saveLeads(leads);
    set({leads, gmailUnread: 0, gmailLoading: false});
    alert(`✓ ${newLeads.length} lead${newLeads.length !== 1 ? 's' : ''} geïmporteerd uit Gmail.`);
  } catch(e) {
    set({gmailLoading: false});
    alert('Importeren mislukt.\n\n' + e.message);
  }
}

    <div class="header-actions">
      ${!isArchief&&!isVerkocht?`<button class="btn btn-primary" onclick="openAdd()">+ Nieuwe Lead</button>`:''}
    </div>
  </div>
  <div class="page-content" style="display:flex;flex-direction:column;min-height:0;gap:0">
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="search-input" placeholder="Naam, bedrijf, land…" value="${esc(S.q)}" oninput="onSearch(this.value)">
      </div>
      <select class="fs" onchange="set({fPrio:this.value,lp:1})">
        <option value="">Alle prioriteiten</option>
        ${prios.map(p=>`<option value="${p}" ${S.fPrio===p?'selected':''}>${p}</option>`).join('')}
      </select>
      <select class="fs" onchange="set({fFU:this.value,lp:1})">
        <option value="">Alle datums</option>
        <option value="overdue" ${S.fFU==='overdue'?'selected':''}>Te laat</option>
        <option value="today" ${S.fFU==='today'?'selected':''}>Vandaag</option>
        <option value="week" ${S.fFU==='week'?'selected':''}>Deze week</option>
        <option value="nodate" ${S.fFU==='nodate'?'selected':''}>Geen datum</option>
      </select>
      ${(S.q||S.fPrio||S.fFU)?`<button class="btn btn-secondary btn-sm" onclick="set({q:'',fPrio:'',fFU:'',lp:1})">✕ Reset</button>`:''}
    </div>
    <div class="table-wrap">
      <div class="table-info">
        <span class="table-count">${Math.min(start+1,total)}–${Math.min(start+S.pp,total)} van ${total}</span>
      </div>
      <div class="table-scroll">
        <table><thead><tr>
          ${th('naam','Naam')}${th('bedrijf','Bedrijf')}${th('land','Land')}
          ${th('status','Status')}${th('prioriteit','Prio')}${th('follow_up_datum','Follow-up')}
          <th>Notitie</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      <div class="pagination">
        <button class="pb" onclick="setPage(${S.lp-1})" ${S.lp<=1?'disabled':''}>←</button>
        ${pageNums.map(p=>`<button class="pb ${p===S.lp?'active':''}" onclick="setPage(${p})">${p}</button>`).join('')}
        ${tp>7?`<span style="color:#5a5555;padding:0 4px">…</span><button class="pb ${tp===S.lp?'active':''}" onclick="setPage(${tp})">${tp}</button>`:''}
        <button class="pb" onclick="setPage(${S.lp+1})" ${S.lp>=tp?'disabled':''}>→</button>
        <span class="pi">Pagina ${S.lp} / ${tp}</span>
      </div>
    </div>
  </div>`;
}

function pgImport(){
  return`<div class="page-header">
    <div><div class="page-title">Importeren</div><div class="page-subtitle">CSV import</div></div>
  </div>
  <div class="page-content">
    <div class="banner banner-lime">
      <div><strong>501 leads</strong> geladen · <strong>95 leads</strong> met automatisch herkende follow-up datum</div>
    </div>
    <div style="border:1px dashed #4a4646;border-radius:2px;padding:48px;text-align:center;cursor:pointer;transition:border-color .2s" id="dropZone" onclick="document.getElementById('fi').click()" ondragover="event.preventDefault();this.style.borderColor='#add3a1'" ondragleave="this.style.borderColor=''" ondrop="handleDrop(event)">
      <div style="font-size:24px;margin-bottom:10px;opacity:.3;color:#add3a1">↓</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Sleep CSV hierheen of klik</div>
      <div style="font-size:12px;color:#5a5555">Exporteer Excel als CSV UTF-8</div>
    </div>
    <input type="file" id="fi" accept=".csv" style="display:none" onchange="handleFile(this)">
    <div id="importResult"></div>
  </div>`;
}

function renderModal(){
  if(S.modal==='view')return viewModal();
  if(S.modal==='add'||S.modal==='edit')return formModal();
  return'';
}

function viewModal(){
  const l=S.sel;if(!l)return'';
  const fd=pDate(l.follow_up_datum);const dv=diff(fd);
  const overLabel=dv!=null&&dv<0?`<span style="color:#e07070;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px"> · ${Math.abs(dv)}D TE LAAT</span>`:'';
  const autoNote=l.follow_up_auto?`<div style="margin-top:6px"><span class="snippet-tag">🤖 "${esc(l.follow_up_auto)}"</span><span style="font-size:11px;color:#5a5555;margin-left:6px">Auto-herkend</span></div>`:'';
  return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">${esc(l.naam)}</div>
        <div style="font-size:11px;color:#9a9595;margin-top:3px;text-transform:uppercase;letter-spacing:.8px">${esc(l.bedrijf||'—')} · ${esc(l.land||'—')}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="badge ${sBadge(l.status)}">${esc(l.status)}</span>
        <span class="badge ${pBadge(l.prioriteit)}">${esc(l.prioriteit||'Normaal')}</span>
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="vg">
        <div class="vf"><div class="vl">Email</div><div class="vv">${l.email?`<a href="mailto:${esc(l.email)}" style="color:#add3a1">${esc(l.email)}</a>`:'—'}</div></div>
        <div class="vf"><div class="vl">Telefoon</div><div class="vv">${esc(l.telefoon||'—')}</div></div>
        <div class="vf"><div class="vl">Type</div><div class="vv">${esc(l.type_interesse||'—')}</div></div>
        <div class="vf"><div class="vl">Bron</div><div class="vv">${esc(l.bron||'—')}</div></div>
        <div class="vf"><div class="vl">Binnengekomen</div><div class="vv">${fmt(l.datum_binnengekomen)}</div></div>
        <div class="vf"><div class="vl">Laatste contact</div><div class="vv">${fmt(l.laatste_contact)}</div></div>
        <div class="vf"><div class="vl">Intern contact</div><div class="vv">${esc(l.contact_persoon_intern||'—')}</div></div>
        <div class="vf">
          <div class="vl">Follow-up datum</div>
          <div class="vv">${fmt(l.follow_up_datum)}${overLabel}</div>
          ${autoNote}
        </div>
      </div>
      <div class="divider"></div>
      <div class="vf"><div class="vl">Volgende actie</div><div class="vv">${esc(l.volgende_actie||'—')}</div></div>
      <div class="vf"><div class="vl">Beschrijving</div><div class="vv" style="white-space:pre-wrap;line-height:1.7;font-size:13px">${esc(l.beschrijving||'—')}</div></div>
      <div class="vf"><div class="vl">Opmerkingen</div><div class="vv" style="white-space:pre-wrap">${esc(l.opmerkingen||'—')}</div></div>
    </div>
    <div class="modal-footer">
      ${l.status==='Beeindigt'||l.archived&&l.status!=='Verkocht'?`<button class="btn btn-secondary btn-sm" onclick="restoreLead('${l.id}')">↩ Herstel</button>`:''}
      ${!l.archived?`<button class="btn btn-danger btn-sm" onclick="endLead('${l.id}')">Beëindigen</button>`:''}
      <button class="btn btn-secondary" onclick="closeModal()">Sluiten</button>
      <button class="btn btn-primary" onclick="editLead('${l.id}')">✏ Bewerken</button>
    </div>
  </div></div>`;
}

function formModal(){
  const isEdit=S.modal==='edit';const f=S.form||{};
  const inp=(name,lbl,type='text',full=false)=>`<div class="fg ${full?'full':''}"><label class="fl">${lbl}</label><input type="${type}" class="fi" name="${name}" value="${esc(f[name]||'')}"></div>`;
  const sel=(name,lbl,opts,full=false)=>`<div class="fg ${full?'full':''}"><label class="fl">${lbl}</label><select class="fi" name="${name}">${opts.map(o=>`<option value="${esc(o)}" ${f[name]===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  const ta=(name,lbl)=>`<div class="fg full"><label class="fl">${lbl}</label><textarea class="fi" name="${name}">${esc(f[name]||'')}</textarea></div>`;
  const autoNote=f.follow_up_auto&&isEdit?`<div style="margin-top:5px"><span class="snippet-tag">🤖 "${esc(f.follow_up_auto)}"</span></div>`:'';
  return`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Lead bewerken':'Nieuwe lead'}</div>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body"><div class="form-grid" id="lf">
      ${inp('naam','Naam *')}${inp('bedrijf','Bedrijf')}
      ${inp('email','E-mail','email')}${inp('telefoon','Telefoon','tel')}
      ${inp('land','Land')}${sel('status','Status',['Nieuw','In contact','Verkocht','Beeindigt'])}
      ${sel('prioriteit','Prioriteit',['Normaal','Hoog','Laag'])}${sel('type_interesse','Type',['','Koop','Huur','Informatie','Anders'])}
      ${inp('datum_binnengekomen','Binnengekomen','date')}
      <div class="fg"><label class="fl">Follow-up datum</label>
      <div style="display:flex;gap:6px;margin-bottom:6px;">
        <button type="button" onclick="setFollowUp('week')" style="flex:1;padding:6px 0;border-radius:6px;border:1px solid #3a3636;background:#2e2b2c;color:#add3a1;font-size:12px;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#3a3636'" onmouseout="this.style.background='#2e2b2c'">+ 1 week</button>
        <button type="button" onclick="setFollowUp('month')" style="flex:1;padding:6px 0;border-radius:6px;border:1px solid #3a3636;background:#2e2b2c;color:#add3a1;font-size:12px;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#3a3636'" onmouseout="this.style.background='#2e2b2c'">+ 1 maand</button>
        <button type="button" onclick="setFollowUp('year')" style="flex:1;padding:6px 0;border-radius:6px;border:1px solid #3a3636;background:#2e2b2c;color:#add3a1;font-size:12px;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#3a3636'" onmouseout="this.style.background='#2e2b2c'">+ 1 jaar</button>
      </div>
      <input type="date" class="fi" id="follow_up_input" name="follow_up_datum" value="${esc(f.follow_up_datum||'')}" oninput="document.getElementById('auto-snip').style.display='none'"><div id="auto-snip">${autoNote}</div></div>
      ${inp('laatste_contact','Laatste contact','date')}${inp('contact_persoon_intern','Intern contact')}
      ${inp('bron','Bron',undefined,false)}${inp('volgende_actie','Volgende actie',undefined,true)}
      ${ta('beschrijving','Beschrijving / Notities')}
      ${ta('opmerkingen','Interne opmerkingen')}
    </div></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuleer</button>
      <button class="btn btn-primary" onclick="saveLead()">Opslaan</button>
    </div>
  </div></div>`;
}

function go(p){set({page:p,lp:1,q:'',fPrio:'',fFU:''});}
function setPage(p){const max=Math.ceil(filtered().length/S.pp);if(p<1||p>max)return;set({lp:p});}
function sortBy(col){if(S.sort.col===col)set({sort:{col,asc:!S.sort.asc}});else set({sort:{col,asc:true}});}
function openAdd(){set({modal:'add',form:{status:'Nieuw',prioriteit:'Normaal',datum_binnengekomen:todayStr},sel:null});}
function editLead(id){const l=S.leads.find(x=>x.id===id);if(!l)return;set({modal:'edit',form:{...l},sel:l});}
function viewLead(id){const l=S.leads.find(x=>x.id===id);if(!l)return;set({modal:'view',sel:l});}
function closeModal(){set({modal:null,sel:null,form:null});}
function endLead(id){
  const leads=S.leads.map(l=>l.id===id?{...l,status:'Beeindigt',archived:true}:l);
  saveLeads(leads);set({leads,modal:null,sel:null});
}
function restoreLead(id){
  const leads=S.leads.map(l=>l.id===id?{...l,status:'In contact',archived:false}:l);
  saveLeads(leads);set({leads,modal:null,sel:null});
}
function setFollowUp(type){
  const inp=document.getElementById('follow_up_input');
  if(!inp)return;
  const d=new Date();
  if(type==='week') d.setDate(d.getDate()+7);
  else if(type==='month') d.setMonth(d.getMonth()+1);
  else if(type==='year') d.setFullYear(d.getFullYear()+1);
  inp.value=d.toISOString().split('T')[0];
  document.getElementById('auto-snip').style.display='none';
}
function saveLead(){
  const form=document.getElementById('lf');if(!form)return;
  const data={...S.form};
  form.querySelectorAll('input,select,textarea').forEach(el=>{if(el.name)data[el.name]=el.value;});
  if(!data.naam||!data.naam.trim()){alert('Naam is verplicht');return;}
  // Clear auto-detection if follow_up_datum was manually changed
  if(S.modal==='edit'&&S.form&&data.follow_up_datum!==S.form.follow_up_datum){
    data.follow_up_auto=null;data.follow_up_review=null;
  }
  // Auto-archive on status change
  if(data.status==='Beeindigt'||data.status==='Verkocht') data.archived=true;
  else data.archived=false;
  let leads;
  if(S.modal==='edit'){leads=S.leads.map(l=>l.id===data.id?data:l);}
  else{data.id=nid();leads=[data,...S.leads];}
  saveLeads(leads);set({leads,modal:null,form:null,sel:null});
}
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFile(input){const f=input.files[0];if(f)processFile(f);}
function processFile(file){const r=new FileReader();r.onload=e=>importCSV(e.target.result);r.readAsText(file,'UTF-8');}
function importCSV(text){
  const lines=text.trim().split('\n');if(lines.length<2)return;
  const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
  const colMap={naam:['naam','name'],bedrijf:['bedrijf','company'],email:['email'],telefoon:['telefoon','phone'],land:['land','locatie'],status:['status'],prioriteit:['prioriteit','prio'],beschrijving:['beschrijving','notes'],datum_binnengekomen:['datum','date'],follow_up_datum:['follow-up','follow_up'],laatste_contact:['laatste contact'],bron:['bron','source']};
  const mapped=headers.map(h=>{for(const[f,a]of Object.entries(colMap)){if(a.some(x=>h.includes(x)))return f;}return null;});
  const newLeads=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    const lead={id:nid(),status:'Nieuw',prioriteit:'Normaal',bron:'Import',archived:false};
    cols.forEach((val,j)=>{if(mapped[j])lead[mapped[j]]=val;});
    if(lead.naam)newLeads.push(lead);
  }
  if(!newLeads.length){document.getElementById('importResult').innerHTML=`<div style="margin-top:12px;color:#e07070;font-size:13px;font-weight:600">Geen leads gevonden.</div>`;return;}
  const leads=[...newLeads,...S.leads];saveLeads(leads);set({leads});
  document.getElementById('importResult').innerHTML=`<div style="margin-top:12px;padding:14px;background:rgba(173,211,161,.08);border:1px solid rgba(173,211,161,.2);border-radius:2px;color:#add3a1;font-size:13px;font-weight:700">${newLeads.length} leads geïmporteerd</div>`;
}
render();
</script>
</body>
</html>
